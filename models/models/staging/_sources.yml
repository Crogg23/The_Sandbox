version: 2

sources:
  - name: snowflake_public_data
    database: SNOWFLAKE_PUBLIC_DATA_PAID
    schema: PUBLIC_DATA
    description: >
      Snowflake's curated public dataset covering US geography, weather,
      FEMA disasters, housing markets, migration, employment, and demographics.

    tables:
      # ── GLUE (geography reference) ──────────────────────────
      - name: geography_index
        description: Master list of geographic entities (continent, country, state, county, tract) with unique geo_id.
      - name: geography_characteristics
        description: Key-value attributes for geographic entities including coordinates (WKT, GeoJSON) and metadata.
      - name: geography_hierarchy
        description: Parent-child nesting of geographic entities.
      - name: geography_relationships
        description: Relationships between geographic entities with level classification.
      - name: geography_overlaps
        description: Overlap mappings between geographic boundaries (e.g. county ↔ metro area).

      # ── LAYER 1: FEMA disasters ─────────────────────────────
      - name: fema_disaster_declaration_index
        description: Federal disaster declarations with type, dates, and incident classification.
      - name: fema_disaster_declaration_areas_index
        description: Geographic areas impacted by each FEMA disaster declaration.
      - name: fema_mission_assignment_index
        description: FEMA mission assignments linked to disaster responses.
      - name: fema_region_index
        description: FEMA regional boundaries and identifiers.
      - name: fema_national_flood_insurance_program_claim_index
        description: Individual NFIP flood insurance claims.
      - name: fema_national_flood_insurance_program_policy_index
        description: Active NFIP flood insurance policies.

      # ── LAYER 1: Weather (NOAA) ─────────────────────────────
      - name: noaa_weather_metrics_timeseries
        description: NOAA weather station observations over time (temp, precip, wind, etc.).
      - name: noaa_weather_metrics_attributes
        description: Metadata describing NOAA weather metric variables.
      - name: noaa_weather_station_index
        description: NOAA weather station locations and identifiers.

      # ── LAYER 1: Weather (NWS) ──────────────────────────────
      - name: nws_weather_alert_events
        description: National Weather Service alert events with severity, urgency, certainty, and timestamps.
      - name: nws_weather_alert_relationships
        description: Parent-child and related-alert linkages between NWS alerts.
      - name: nws_weather_zone_index
        description: NWS forecast zone definitions.
      - name: nws_weather_station_index
        description: NWS weather station locations and identifiers.
      - name: nws_weather_attributes
        description: Metadata for NWS weather variables.
      - name: nws_weather_timeseries
        description: NWS weather observations over time.
      - name: nws_weather_forecast_events
        description: NWS weather forecast records.

      # ── LAYER 1: Weather (AWC aviation) ─────────────────────
      - name: awc_metar_timeseries
        description: Aviation METAR surface weather observations.
      - name: awc_taf_timeseries
        description: Aviation TAF terminal aerodrome forecasts.

      # ── LAYER 2: Housing ────────────────────────────────────
      - name: fhfa_house_price_timeseries
        description: FHFA house price index over time by geography.
      - name: fhfa_house_price_attributes
        description: Metadata for FHFA house price variables.
      - name: us_real_estate_timeseries
        description: US real estate metrics over time (listings, sales, prices).
      - name: us_real_estate_attributes
        description: Metadata for US real estate variables.
      - name: freddie_mac_housing_timeseries
        description: Freddie Mac housing metrics over time.
      - name: freddie_mac_housing_attributes
        description: Metadata for Freddie Mac housing variables.
      - name: fhfa_mortgage_performance_timeseries
        description: FHFA mortgage performance metrics over time.
      - name: home_mortgage_disclosure_attributes
        description: HMDA mortgage disclosure metadata.
      - name: housing_urban_development_timeseries
        description: HUD housing metrics over time.

      # ── LAYER 3: Migration ──────────────────────────────────
      - name: irs_origin_destination_migration_timeseries
        description: IRS county-to-county migration flows based on tax return filings.
      - name: irs_migration_by_characteristic_timeseries
        description: IRS migration data segmented by income, age, and filing characteristics.
      - name: irs_migration_by_characteristic_attributes
        description: Metadata for IRS migration characteristic variables.
      - name: usps_address_change_timeseries
        description: USPS address change request volumes over time.
      - name: usps_address_change_attributes
        description: Metadata for USPS address change variables.

      # ── LAYER 3: Employment ─────────────────────────────────
      - name: bureau_of_labor_statistics_employment_timeseries
        description: BLS employment metrics over time by geography.
      - name: bureau_of_labor_statistics_employment_attributes
        description: Metadata for BLS employment variables.
      - name: us_department_of_labor_unemployment_insurance_claims_timeseries
        description: DOL unemployment insurance claims over time.

      # ── LAYER 4: Demographics ───────────────────────────────
      - name: american_community_survey_timeseries
        description: ACS demographic and socioeconomic estimates over time.
      - name: american_community_survey_attributes
        description: Metadata for ACS survey variables.
      - name: irs_individual_income_timeseries
        description: IRS individual income statistics over time.
      - name: us_economic_census_timeseries
        description: US Economic Census data over time.

      # ── STRETCH: Crime, banking, complaints, healthcare ─────
      - name: urban_crime_timeseries
        description: Urban crime statistics over time.
      - name: fdic_summary_of_deposits_timeseries
        description: FDIC bank deposit summaries over time.
      - name: financial_cfpb_complaint
        description: Consumer Financial Protection Bureau complaint records.
      - name: nppes_provider_addresses
        description: NPPES healthcare provider addresses.
      - name: nrc_reactor_timeseries
        description: Nuclear Regulatory Commission reactor status over time.
