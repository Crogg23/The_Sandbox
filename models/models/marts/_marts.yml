version: 2

models:
  - name: weather_alert_geo
    description: >
      Monthly county-level weather alert summary with severity, category,
      urgency, and hierarchy breakdowns. Primary mart for choropleth
      visualizations and trend analysis.
    columns:
      - name: geo_id_county
        description: County-level geographic identifier. Use with int_geography_county for coordinates.
        tests:
          - not_null
      - name: alert_month_start
        description: First day of the alert month (date grain).
        tests:
          - not_null
      - name: total_events
        description: Total distinct NWS alerts for this county-month.
        tests:
          - not_null
      - name: geoname_state
        tests:
          - not_null
      - name: geoname_county
        tests:
          - not_null

    tests:
      - unique:
          column_name: "geo_id_county || '-' || alert_month_start"
